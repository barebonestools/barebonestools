<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Number Generator</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap" rel="stylesheet">
</head>
<body>
        <script src="./script.mjs" type="module"></script>
        <h1>Random Number Generator</h1>
        <div class="container">
            <div>
                 <label>
                    lower limit (inclusive)
                    <input id="minimum"type="number"value="1"/>
                 </label>
            </div>
            <div>
                <label>
                   upper limit (inclusive)
                   <input id="maximum" type="number"value="10"/>
                </label>
           </div>
           <div>
            <label>
               number of random numbers to generate
               <input id="numbers" type="number"value="1"/>
            </label>
       </div>
    </div>
    <a class="togglewapper wappoff" id="link"href="./simple.html">Advanced&nbsp;mode:&nbsp;on</a>
    <button type="button"id="bigbutt" tabindex="0"class="bigbutt wappon">Go!</button>
    <div id="result" class="togglewapper"></div>
    <button class="togglewapper wappon" id="capy"tabindex="0">Copy to clipboard</button>
</body>
</html>
